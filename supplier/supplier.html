<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supplier Portal | Premium Fleet</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="supplier.css">
</head>
<body>
    
    <div class="auth-wrapper">
        <div class="auth-card">
            
            <div class="auth-header">
                <h2>Supplier Portal</h2>
                <p>Sign in to manage your vehicles & fleet</p>
            </div>

            <div id="loginSection" class="auth-section active">
                <form class="auth-form" action="login.php" id="loginForm" method="POST">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" name="userName" required placeholder="Enter your username">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" name="password" required placeholder="Enter your password">
                    </div>
                    <button type="submit" name="login" class="btn btn-primary">Sign In</button>
                    
                    <p class="toggle-text">
                        Don't have an account? <a href="#" onclick="toggleAuthForms(event)">Sign up here</a>
                    </p>
                </form>
            </div>

            <div id="signUpSection" class="auth-section">
                <form class="auth-form" action="register.php" method="POST" enctype="multipart/form-data">
                    <div class="form-row">
                        <div class="form-group">
                            <label>First Name</label>
                            <input type="text" name="firstName" required>
                        </div>
                        <div class="form-group">
                            <label>Last Name</label>
                            <input type="text" name="lastName" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Phone No.</label>
                        <input type="text" name="phNo" required>
                    </div>
                    <div class="form-group">
                        <label>Email ID</label>
                        <input type="email" name="mailId" required>
                    </div>
                    <div class="form-group">
                        <label>Aadhaar Card (PDF/Img)</label>
                        <input type="file" name="adhar" class="file-input" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" name="userName" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" name="password" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">Create Account</button>
                    
                    <p class="toggle-text">
                        Already have an account? <a href="#" onclick="toggleAuthForms(event)">Sign in</a>
                    </p>
                </form>
            </div>
            
        </div>
    </div>

    <script>
        function toggleAuthForms(e) {
            e.preventDefault();
            const loginSec = document.getElementById('loginSection');
            const signupSec = document.getElementById('signUpSection');
            
            if (loginSec.classList.contains('active')) {
                loginSec.classList.remove('active');
                setTimeout(() => {
                    loginSec.style.display = 'none';
                    signupSec.style.display = 'block';
                    setTimeout(() => signupSec.classList.add('active'), 50);
                }, 300);
            } else {
                signupSec.classList.remove('active');
                setTimeout(() => {
                    signupSec.style.display = 'none';
                    loginSec.style.display = 'block';
                    setTimeout(() => loginSec.classList.add('active'), 50);
                }, 300);
            }
        }
    </script>
</body>
</html>
