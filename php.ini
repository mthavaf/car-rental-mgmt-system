[PHP]
; Display errors (development mode)
display_errors = On
error_reporting = E_ALL

; Memory settings
memory_limit = 256M
max_execution_time = 300
max_input_time = 300

; Upload settings
upload_max_filesize = 50M
post_max_size = 50M

; Session settings
session.auto_start = 1
session.use_strict_mode = 1

; Security
allow_url_fopen = Off
expose_php = Off

; Timezone
date.timezone = UTC
